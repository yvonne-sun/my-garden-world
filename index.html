<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>兑换码中心 - 花园小铺</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航栏 */
        .navbar {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03), 0 1px 0 rgba(0, 0, 0, 0.02);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e9edf2;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 28px;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.45rem;
            background: linear-gradient(135deg, #1f5e3a, #2b8c55);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-item {
            font-size: 1rem;
            font-weight: 500;
            color: #2c5a3b;
            text-decoration: none;
            padding: 8px 4px;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
        }

        .nav-item:hover {
            color: #1c6e3f;
            border-bottom-color: #6fbf8a;
        }

        .nav-item.active {
            color: #1c6e3f;
            border-bottom-color: #2b8c55;
            font-weight: 600;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px 60px;
            width: 100%;
        }

        /* 兑换码页面专用样式 */
        .redeem-header {
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 15px;
            background: white;
            border-radius: 32px;
            padding: 20px 28px;
            border: 1px solid #eef2f6;
        }

        .redeem-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f5e3a, #2b8c55);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .valid-badge {
            background: #eef6f0;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 500;
            color: #2c6e4f;
            font-size: 0.85rem;
        }

        .filter-tip {
            background: #f0f4fa;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 16px;
            color: #2c6280;
        }

        .pagination-bar {
            background: white;
            border-radius: 24px;
            padding: 14px 20px;
            margin: 16px 0 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            border: 1px solid #e9edf2;
        }

        .info-area {
            font-size: 0.9rem;
            font-weight: 500;
            background: #eef2ff;
            padding: 5px 14px;
            border-radius: 40px;
            color: #1e4a76;
        }

        .info-area strong {
            color: #1e7b48;
            font-size: 1.1rem;
        }

        .page-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .jump-wrap {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #f8fafc;
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }

        .jump-wrap input {
            width: 65px;
            padding: 6px 0 6px 10px;
            border: none;
            background: transparent;
            font-size: 0.85rem;
            font-weight: 500;
            outline: none;
        }

        .page-btn-redeem {
            background: white;
            border: 1px solid #dce3ec;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #2c3e50;
        }

        .page-btn-redeem:hover:not(:disabled) {
            background: #eef2fa;
            border-color: #b9c4d4;
            transform: translateY(-1px);
        }

        .page-btn-redeem.active-page {
            background: #1e7b48;
            border-color: #1e7b48;
            color: white;
            box-shadow: 0 2px 6px rgba(30, 123, 72, 0.2);
        }

        .page-btn-redeem:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .redeem-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 22px;
            margin-bottom: 30px;
        }

        .redeem-gift-card {
            background: white;
            border-radius: 28px;
            border: 1px solid #edf2f7;
            transition: all 0.25s ease;
            box-shadow: 0 5px 14px rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }

        .redeem-gift-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.12);
            border-color: #cde0de;
        }

        .urgent-card {
            border-left: 6px solid #ef4444;
            border-top-left-radius: 24px;
            border-bottom-left-radius: 24px;
        }

        .soon-card {
            border-left: 6px solid #f59e0b;
            border-top-left-radius: 24px;
            border-bottom-left-radius: 24px;
        }

        .card-content {
            padding: 20px 22px 18px;
        }

        .card-name {
            font-size: 1.28rem;
            font-weight: 700;
            color: #0b2b26;
            line-height: 1.3;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .expiry-tag {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 40px;
            background: #eef2ff;
            color: #2c5f8a;
        }

        .expiry-tag.permanent {
            background: #e0f2e9;
            color: #1f7840;
        }

        .expiry-tag.urgent {
            background: #fee2e2;
            color: #b91c1c;
        }

        .expiry-tag.soon {
            background: #fef3c7;
            color: #b45309;
        }

        .code-box {
            background: #f8fafd;
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #e9edf2;
            margin-top: 6px;
        }

        .code-text {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-weight: 600;
            font-size: 1rem;
            color: #1e4663;
            letter-spacing: 0.3px;
            word-break: break-all;
        }

        .copy-action {
            background: white;
            border: 1px solid #cddfe7;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #2c6e4f;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .copy-action:hover:not(:disabled) {
            background: #e9f4ef;
            border-color: #9bc6ae;
            color: #1a5a3e;
        }

        .copy-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .date-hint {
            font-size: 0.7rem;
            color: #7c8ea0;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-top: 1px dashed #e9edf2;
            padding-top: 10px;
        }

        .empty-redeem {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 32px;
            color: #6c86a3;
            font-size: 1rem;
            border: 1px solid #edf2f6;
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #1e7b48;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            background: white;
            border-top: 1px solid #eef2f8;
            padding: 24px;
            text-align: center;
            color: #7e9a8c;
            font-size: 0.75rem;
        }

        @media (max-width: 640px) {
            .nav-container {
                padding: 0 18px;
            }
            .redeem-card-grid {
                grid-template-columns: 1fr;
            }
            .pagination-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .page-controls {
                justify-content: center;
            }
            .redeem-header h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="nav-container">
        <div class="logo-area">
            <span class="logo-icon">🌸</span>
            <span class="logo-text">花园小铺</span>
        </div>
        <div class="nav-links">
            <a href="#" class="nav-item active" id="redeemNavBtn">🎁 兑换码</a>
        </div>
    </div>
</header>

<main class="main-content" id="mainContent">
    <!-- 兑换码页面将动态渲染在此，无首页内容 -->
    <div id="redeepPageContainer"></div>
</main>

<footer class="footer">
    <p>🍃 仅展示有效期内礼包 · 自动过滤过期/未开始兑换码 · 一键复制前往游戏兑换</p>
</footer>

<script>
    // 页面启动后直接构建兑换码完整功能，无首页组件
    (function() {
        // ---------- API 配置 ----------
        const BASE_URL = 'https://ap.xiaopidd.com/api.AppletNXH/getNxhncodesListOnPage';
        const LIMIT = 10;          // 原始API每页数量
        const PAGE_SIZE = 10;      // 前端展示每页有效礼包数量
        
        // 全局状态
        let allRawItems = [];           // 所有原始礼包
        let validItems = [];            // 过滤后的有效礼包列表
        let currentPage = 1;
        let totalValid = 0;
        let totalValidPages = 1;
        let totalBackendPages = 1;
        let loadedPages = new Set();
        let isLoading = false;
        
        // DOM 元素
        const container = document.getElementById('redeepPageContainer');
        
        // 辅助函数
        function showToastMessage(msg, duration = 1800) {
            let toast = document.getElementById('globalToast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'globalToast';
                toast.style.position = 'fixed';
                toast.style.bottom = '30px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.backgroundColor = '#1e2a3e';
                toast.style.color = 'white';
                toast.style.padding = '10px 26px';
                toast.style.borderRadius = '60px';
                toast.style.fontSize = '0.85rem';
                toast.style.zIndex = '1000';
                toast.style.boxShadow = '0 10px 20px rgba(0,0,0,0.2)';
                toast.style.transition = 'opacity 0.2s';
                toast.style.opacity = '0';
                toast.style.pointerEvents = 'none';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.opacity = '1';
            if (window.toastTimer) clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => {
                toast.style.opacity = '0';
            }, duration);
        }
        
        async function copyToClipboard(text) {
            if (!text || text === '') {
                showToastMessage('❌ 无兑换码', 1000);
                return false;
            }
            try {
                await navigator.clipboard.writeText(text);
                showToastMessage(`✅ 已复制: ${text}`, 1500);
                return true;
            } catch (err) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToastMessage(`📋 已复制: ${text}`, 1500);
                return true;
            }
        }
        
        // 有效期判断
        function isGiftValid(item) {
            const now = Math.floor(Date.now() / 1000);
            const st = item.stime_int !== undefined ? item.stime_int : 0;
            const et = item.etime_int !== undefined ? item.etime_int : 0;
            // 永久有效标记 (shixiao=2 且无时间限制)
            if (item.shixiao === 2 && (st === 0 && et === 0)) return true;
            if (st === 0 && et === 0) return false;
            if (st !== 0 && now < st) return false;
            if (et !== 0 && now > et) return false;
            return true;
        }
        
        // 获取过期样式和标签
        function getExpiryInfo(item) {
            const now = Math.floor(Date.now() / 1000);
            const st = item.stime_int || 0;
            const et = item.etime_int || 0;
            
            // 永久有效
            if (item.shixiao === 2 && (st === 0 && et === 0)) {
                return { class: '', label: '永久有效', labelClass: 'permanent' };
            }
            if (st === 0 && et === 0) return { class: '', label: '', labelClass: '' };
            
            if (et !== 0 && now <= et) {
                const remainSec = et - now;
                const hoursLeft = remainSec / 3600;
                if (hoursLeft <= 6 && hoursLeft > 0) {
                    return { class: 'urgent-card', label: '🔥 紧急失效', labelClass: 'urgent' };
                } else if (hoursLeft <= 24 && hoursLeft > 0) {
                    return { class: 'soon-card', label: '⚠️ 即将过期', labelClass: 'soon' };
                } else {
                    return { class: '', label: `有效期内`, labelClass: '' };
                }
            } else if (et === 0 && st !== 0 && now >= st) {
                return { class: '', label: '长期有效', labelClass: 'permanent' };
            }
            return { class: '', label: '', labelClass: '' };
        }
        
        // 请求单页原始数据
        async function fetchRawPage(page) {
            const url = `${BASE_URL}?page=${page}&limit=${LIMIT}&fid=1`;
            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const result = await resp.json();
                if (result.code === 0 && result.data) {
                    const { data, last_page } = result.data;
                    if (!totalBackendPages && last_page) totalBackendPages = last_page;
                    return { success: true, items: Array.isArray(data) ? data : [], lastPage: last_page };
                }
                return { success: false, msg: result.msg };
            } catch (err) {
                return { success: false, msg: err.message };
            }
        }
        
        // 加载所有缺失的原始分页（全量拉取，实现有效兑换码全量分页）
        async function loadAllRawData(showLoading = true) {
            if (isLoading) return;
            isLoading = true;
            if (showLoading && container) {
                container.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><div style="margin-top:12px; color:#5e7b6e;">正在获取有效礼包库...</div></div>`;
            }
            // 先获取第一页获得总页数
            if (totalBackendPages === 1 && allRawItems.length === 0) {
                const first = await fetchRawPage(1);
                if (first.success && first.items) {
                    allRawItems.push(...first.items);
                    loadedPages.add(1);
                    if (first.lastPage) totalBackendPages = first.lastPage;
                } else {
                    isLoading = false;
                    if (container) container.innerHTML = `<div class="empty-redeem">❌ 网络或接口异常，请刷新重试</div>`;
                    return;
                }
            }
            const targetTotal = totalBackendPages;
            if (targetTotal > 1) {
                const promises = [];
                for (let p = 2; p <= targetTotal; p++) {
                    if (!loadedPages.has(p)) {
                        promises.push(fetchRawPage(p).then(res => res.success ? res.items : []));
                    }
                }
                const results = await Promise.all(promises);
                for (const items of results) {
                    if (items.length) allRawItems.push(...items);
                    // 记录已加载（粗略标记，实际页码通过索引递增，不影响功能）
                }
                for (let i = 2; i <= targetTotal; i++) loadedPages.add(i);
            }
            // 重建有效列表
            validItems = allRawItems.filter(item => isGiftValid(item));
            totalValid = validItems.length;
            totalValidPages = Math.ceil(totalValid / PAGE_SIZE);
            if (totalValidPages === 0) totalValidPages = 1;
            if (currentPage > totalValidPages) currentPage = 1;
            isLoading = false;
            renderRedeemUI();
            renderPagination();
        }
        
        // 渲染当前页有效礼包
        function renderRedeemUI() {
            if (!container) return;
            if (validItems.length === 0) {
                container.innerHTML = `<div class="empty-redeem">✨ 暂时没有有效的兑换码<br>可能礼包都已过期，请稍后再来看看~</div>`;
                return;
            }
            const start = (currentPage - 1) * PAGE_SIZE;
            const pageItems = validItems.slice(start, start + PAGE_SIZE);
            if (pageItems.length === 0) {
                container.innerHTML = `<div class="empty-redeem">📭 当前页无有效礼包，试试其他页</div>`;
                return;
            }
            
            const cardsHtml = pageItems.map(item => {
                const giftName = item.name || '未命名礼包';
                const giftCode = (item.code !== undefined && item.code !== null) ? item.code : '';
                const displayCode = giftCode === '' ? '暂无兑换码' : giftCode;
                const hasCode = giftCode !== '';
                const expiry = getExpiryInfo(item);
                const cardClass = expiry.class;
                const labelText = expiry.label;
                const labelClass = expiry.labelClass;
                
                let dateExtra = '';
                if (item.stime && item.etime && item.stime !== null && item.etime !== null && !(item.shixiao === 2 && item.stime_int === 0)) {
                    dateExtra = `<div class="date-hint">📆 ${item.stime} 至 ${item.etime}</div>`;
                } else if (item.shixiao === 2 && (!item.stime || item.stime_int === 0)) {
                    dateExtra = `<div class="date-hint">🌟 永久有效，随时兑换</div>`;
                }
                
                return `
                    <div class="redeem-gift-card ${cardClass}">
                        <div class="card-content">
                            <div class="card-name">
                                ${escapeHtml(giftName)}
                                ${labelText ? `<span class="expiry-tag ${labelClass}">${escapeHtml(labelText)}</span>` : ''}
                            </div>
                            <div class="code-box">
                                <span class="code-text">${escapeHtml(displayCode)}</span>
                                <button class="copy-action" data-code="${escapeAttr(giftCode)}" ${!hasCode ? 'disabled style="opacity:0.5;"' : ''}>
                                    📋 复制
                                </button>
                            </div>
                            ${dateExtra}
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = `
                <div class="redeem-header">
                    <h2>🎁 有效兑换码中心</h2>
                    <div class="valid-badge">✨ 仅展示有效期内礼包 · 分页基于有效兑换码</div>
                </div>
                <div class="filter-tip">⏰ 自动过滤过期/未开始 · 永久礼包长期展示</div>
                <div class="pagination-bar" id="redeemPaginationBar">
                    <div class="info-area">📦 有效礼包总数: <strong id="totalValidSpan">${totalValid}</strong></div>
                    <div class="page-controls" id="pageControls"></div>
                    <div class="jump-wrap">
                        跳转第 <input type="number" id="jumpPageInput" min="1" value="${currentPage}" max="${totalValidPages}"> 页
                        <button id="jumpConfirmBtn" class="page-btn-redeem">GO</button>
                    </div>
                </div>
                <div class="redeem-card-grid" id="redeemCardGrid">
                    ${cardsHtml}
                </div>
            `;
            
            // 绑定复制按钮
            document.querySelectorAll('.copy-action').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const code = btn.getAttribute('data-code');
                    if (code && code !== '') copyToClipboard(code);
                    else showToastMessage('⚠️ 无兑换码', 1000);
                });
            });
            
            // 更新总数显示
            const totalSpan = document.getElementById('totalValidSpan');
            if (totalSpan) totalSpan.innerText = totalValid;
        }
        
        function renderPagination() {
            const pageControlsDiv = document.getElementById('pageControls');
            if (!pageControlsDiv) return;
            let btnsHtml = '';
            btnsHtml += `<button class="page-btn-redeem" id="prevPageBtn" ${currentPage <= 1 ? 'disabled' : ''}>◀ 上一页</button>`;
            
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalValidPages, currentPage + 2);
            if (startPage > 1) {
                btnsHtml += `<button class="page-btn-redeem page-num" data-page="1">1</button>`;
                if (startPage > 2) btnsHtml += `<span style="padding:0 6px;">...</span>`;
            }
            for (let i = startPage; i <= endPage; i++) {
                btnsHtml += `<button class="page-btn-redeem page-num ${i === currentPage ? 'active-page' : ''}" data-page="${i}">${i}</button>`;
            }
            if (endPage < totalValidPages) {
                if (endPage < totalValidPages - 1) btnsHtml += `<span style="padding:0 6px;">...</span>`;
                btnsHtml += `<button class="page-btn-redeem page-num" data-page="${totalValidPages}">${totalValidPages}</button>`;
            }
            btnsHtml += `<button class="page-btn-redeem" id="nextPageBtn" ${currentPage >= totalValidPages ? 'disabled' : ''}>下一页 ▶</button>`;
            pageControlsDiv.innerHTML = btnsHtml;
            
            // 绑定页码点击
            document.querySelectorAll('.page-num').forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = parseInt(btn.getAttribute('data-page'), 10);
                    if (!isNaN(target) && target !== currentPage) {
                        currentPage = target;
                        renderRedeemUI();
                        renderPagination();
                        const jumpInput = document.getElementById('jumpPageInput');
                        if (jumpInput) jumpInput.value = currentPage;
                        window.scrollTo({ top: 280, behavior: 'smooth' });
                    }
                });
            });
            
            const prevBtn = document.getElementById('prevPageBtn');
            const nextBtn = document.getElementById('nextPageBtn');
            if (prevBtn) prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; renderRedeemUI(); renderPagination(); const inp = document.getElementById('jumpPageInput'); if(inp) inp.value = currentPage; window.scrollTo({ top: 280, behavior: 'smooth' }); } };
            if (nextBtn) nextBtn.onclick = () => { if (currentPage < totalValidPages) { currentPage++; renderRedeemUI(); renderPagination(); const inp = document.getElementById('jumpPageInput'); if(inp) inp.value = currentPage; window.scrollTo({ top: 280, behavior: 'smooth' }); } };
            
            const jumpBtn = document.getElementById('jumpConfirmBtn');
            const jumpInput = document.getElementById('jumpPageInput');
            if (jumpBtn && jumpInput) {
                jumpBtn.onclick = () => {
                    let target = parseInt(jumpInput.value, 10);
                    if (isNaN(target)) target = currentPage;
                    if (target < 1) target = 1;
                    if (target > totalValidPages) target = totalValidPages;
                    if (target !== currentPage) {
                        currentPage = target;
                        renderRedeemUI();
                        renderPagination();
                        jumpInput.value = currentPage;
                        window.scrollTo({ top: 280, behavior: 'smooth' });
                    } else {
                        showToastMessage(`已在第${target}页`, 900);
                    }
                };
                jumpInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') jumpBtn.click(); });
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
        }
        function escapeAttr(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        
        // 启动：加载全量数据
        loadAllRawData(true);
    })();
</script>
</body>
</html>
